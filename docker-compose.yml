services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cesizen-api:dev
    container_name: cesizen-api
    expose:
      - "8080"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - cesizen-network

  web:
    build:
      context: ./CesiZen.Web/cesizen.web.client
      dockerfile: Dockerfile
    image: cesizen-web:dev
    container_name: cesizen-web
    ports:
      - "8080:80"
    environment:
      - API_URL=http://api:8080
      - API_HOST=api:8080
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - cesizen-network

networks:
  cesizen-network:
    driver: bridge